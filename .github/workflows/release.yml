name: Release

on:
  push:
    tags:
      - "v*"

jobs:
  build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - name: Fetch private artifact database
        env:
          ARTIFACTS_TOKEN: ${{ secrets.ARTIFACTS_TOKEN }}
        run: |
          git clone https://x-access-token:$env:ARTIFACTS_TOKEN@github.com/namefailed/chaff-artifacts.git ../chaff-artifacts
          Copy-Item ../chaff-artifacts/artifacts.json ./artifacts.json

      - name: Install Rust
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: x86_64-pc-windows-msvc

      - name: Build release binary
        run: cargo build --release

      - name: Upload release asset
        uses: softprops/action-gh-release@v2
        with:
          files: target/release/chaff.exe
